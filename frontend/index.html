<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>TruthLens AI — Free AI-Powered Fact Checker</title>
    <meta name="description" content="Verify any claim with AI-powered fact-checking. TruthLens analyzes claims against real web sources, fact-checkers, and academic research to deliver citation-backed verdicts." />
    <meta name="keywords" content="fact check, AI fact checker, claim verification, misinformation, truth, evidence-based" />
    <meta name="author" content="TruthLens" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://truthlens.app" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TruthLens AI — Free AI-Powered Fact Checker" />
    <meta property="og:description" content="Verify any claim with AI. Citation-backed verdicts from real web sources, fact-checkers, and academic research." />
    <meta property="og:site_name" content="TruthLens" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TruthLens AI — Free Fact Checker" />
    <meta name="twitter:description" content="AI-powered fact-checking with real sources and citations. Free to use." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TruthLens AI",
      "description": "AI-powered fact-checking platform that verifies claims against real web sources",
      "url": "https://truthlens.app",
      "applicationCategory": "UtilityApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0a0a1a" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
