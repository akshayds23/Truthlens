# TruthLens AI - 2-Service Architecture
# Uses external cloud database (Neon/Supabase) via DATABASE_URL in .env
# Services: Frontend (React) + Backend (Express + FastAPI)
# Run: docker compose up -d
# Frontend: http://localhost:3000
# API: http://localhost:5000

services:
  # Combined Backend: Express API Gateway + FastAPI AI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: truthlens-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      CORS_ORIGIN: "*"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - truthlens-network

  # Frontend: React 18 + TypeScript + Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: truthlens-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - truthlens-network

networks:
  truthlens-network:
    driver: bridge
